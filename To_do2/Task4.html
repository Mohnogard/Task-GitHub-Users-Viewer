<!DOCTYPE html>
<head>   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Task 4</title>
</head>
<body>
    <h2>Fill Out Your Information</h2>
    <fieldset>
        <legend>Form</legend>

        <label for="fn">First Name:</label><br>
            <input id="fn" type="text" required><br>
        <label for="ln">Last Name:</label><br>
            <input id="ln" type="text" required ><br>
        <label for="email">Email:</label><br>
            <input id="email" type="email" required><br><br>

        <h3>Your Gender</h3>
        <input id="m" type="radio" name="option" value="Gender">
        <label for="m">Male</label>    
        <input id="f" type="radio" name="option" value="Gender">
        <label for="">Female</label>
            
        
        <h3>Favorite subject</h3>
            <input id="C++" type="checkbox">
            <label for="C++">C++</label>
            <input id="Java" type="checkbox">
            <label for="Java">Java</label>
            <input id="C#" type="checkbox">
            <label for="C#">C#</label>
            <input id="PHP" type="checkbox">
            <label for="PHP">PHP</label>
            <input id="SQL" type="checkbox">
            <label for="SQL">SQL</label>
            
        <h3>Your City</h3>
            <label>City:</label>
            <select>
                <option id="Amman">Amman</option>
                <option id="Irbid">Irbid</option>
                <option id="Ma'an">Ma'an</option>
                <option id="Jarash">Jarash</option>
                <option id="Zarqa">Zarqa</option>
                <option id="Azraq">Azraq</option>
                <option id="Ajloun">Ajloun</option>
                <option itemid="Madaba">Madaba</option>
                <option id="Karak">Karak</option>
            </select><br><br>

            <label for="myimage">Upload Image:</label>
            <input type="file" id="myimage" name="myimage"><br><br>

            <label for="Write">Write about yourself:</label><br><br>
            <textarea id="Write" rows="4" cols="40" style="color: gray;">Write here</textarea><br><br>
        
            <input type="button" id="submit" value="Submit">
    </fieldset><br><br>

    <form>
        <table>
            <tr>
                <td><label for="N">Name:</label></td>
                <td><input type="text" id="N"></td>
            </tr>
            <tr>
                <td><label for="A">Address:</label></td>
                <td><input type="text" id="A"></td>
            </tr>
            <tr>
                <td><label for="C">City:</label></td>
                <td><input type="text" id="C"></td>
            </tr>
            <tr>
                <td><label for="S">State:</label></td>
                <td><input type="text" id="S"></td>
            </tr>
            <tr>
                <td><label for="Z">Zip:</label></td>
                <td><input type="text" id="Z"></td>
            </tr>
            <tr>
                <td><label>Magazine:</label></td>
                <td><select>
                <option>Newsweek</option>
                <option>Newsmonth</option>
                <option>Newsyear</option>
                </select></td>
            </tr>
            <tr>
                <td><label>Subscription:</label></td>
                <td><input type="radio">1 year
                <input type="radio">2 years</td>
            </tr>
            <tr>
                <td>
                    <input type="button" id="Check" value="Send Your Order">
                </td>
            </tr>
        </table>
    </form>
    
</body>
