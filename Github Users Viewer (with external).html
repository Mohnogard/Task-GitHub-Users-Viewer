<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GitHub Users Viewer EX</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="gitstyle.css" />
</head>

<body>
  <div class="container">
          <h1><a href="https://github.com/"> <i class="fa-brands fa-github" style="margin-right: 10px; color: black; font-size: 40px;"></i></a>Github Users <span style="color:  rgb(100, 100, 255);">Viewer</span></h1>
          <div>Fetch data from the GitHub API and display users dynamically</div>

          <hr style="margin: 20px 0px">
          
          <div id="loading" class="board">
            <div style="font-weight: bold; font-size: x-large;"><img
            width="30"
            height="30"
            src="https://img.icons8.com/emoji/48/bullseye.png"
            alt="bullseye"
          /> Your task</div>
            <div><i class="fa-solid fa-circle-check" style="color: rgb(100, 100, 255);"></i> Fetch users from:<a href=https://api.github.com/users target="_blank" style="background-color: rgba(167, 167, 255, 0.242);color: blue;">https://api.github.com/users</a></div>
            <div><i class="fa-solid fa-circle-check" style="color: rgb(100, 100, 255);" ></i> Display each user's avatar, username, and profile link</div>
            <div><i class="fa-solid fa-circle-check" style="color: rgb(100, 100, 255);"></i> Show the data inside beautiful user cards (first 10 users)</div>
          </div>

          <div  id='loading users' class="loading">Loading users</div>
          <div class="divider">
            <hr><span style="margin: 20px;">Users will appear here</span><hr>    
          </div>

          <div id="searchbar" style="text-align: right; margin: 20px;"> 
            <input type="text" class="search-bar" placeholder="search"/>
          </div>

          <div id="users" class="userss"></div>
        
    </div>

 <script src="gitjs.js"></script>
</body>
</html>
