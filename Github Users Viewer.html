<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GitHub Users Viewer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  
    body{
         font-family: open sans; 
         padding: 2rem; 
         justify-items: center;
    }

    .container{
      align-items: center;
      align-content: center;
      padding: 30px;
      width: 90%;
      text-align: center;
      height: fit-content;
      border-radius: 15px;
      box-shadow: 0px 0px 10px rgb(180, 180, 180) ;
    }

    .userss{
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 20px;
        width: 100%;
      }
    .userss .name{
      border: none;
      border-radius: 10px;
      height:200px;
      align-content: center;
      text-align: center;
      box-shadow: 0px 0px 10px rgba(180, 180, 180, 0.686) ;
    }
    .search-bar {
      border-radius: 3px;
      margin: -10px 0px 20px 0px;
      padding: 10px;
      border: solid 1px rgb(184, 184, 184);
      box-shadow: 0px 0px 4px rgba(180, 180, 180, 0.686) ;
    }
    .userss .name:hover{
      animation: mymove 2s infinite;
      transform: translateY(-10px);
      box-shadow: 1px 1px 7px 3px #ccc;
    }
    @keyframes mymove{
      from {background-color: rgb(97, 213, 97);}
      to {background-color: rgb(206, 88, 88);}
    }

    .board{
      background-color: rgba(166, 187, 254, 0.462);
      border-left: 8px solid rgb(0, 0, 165);
      padding: 30px;
      text-align: left;
      border-radius: 10px;
    }
    .board div{
      margin: 20px 5px;
    }

    .loading{
      border-radius: 5px;
      background-color:rgb(100, 100, 255);
      color: white;
      margin: 20px auto;
      width: 15%;
      padding: 15px 0px;
    }

    .divider {
      display: flex;
      align-items: center;
    }
    .divider hr {
      flex: 1;
    }
</style>
</head>

<body>
  <div class="container">
          <h1><a href="https://github.com/"> <i class="fa-brands fa-github" style="margin-right: 10px; color: black; font-size: 40px;"></i></a>Github Users <span style="color:  rgb(100, 100, 255);">Viewer</span></h1>
          <div>Fetch data from the GitHub API and display users dynamically</div>

          <hr style="margin: 20px 0px">
          
          <div id="loading" class="board">
            <div style="font-weight: bold; font-size: x-large;"><img
            width="30"
            height="30"
            src="https://img.icons8.com/emoji/48/bullseye.png"
            alt="bullseye"
          /> Your task</div>
            <div><i class="fa-solid fa-circle-check" style="color: rgb(100, 100, 255);"></i> Fetch users from:<a href=https://api.github.com/users target="_blank" style="background-color: rgba(167, 167, 255, 0.242);color: blue;"">https://api.github.com/users</a></div>
            <div><i class="fa-solid fa-circle-check" style="color: rgb(100, 100, 255);" ></i> Display each user's avatar, username, and profile link</div>
            <div><i class="fa-solid fa-circle-check" style="color: rgb(100, 100, 255);"></i> Show the data inside beautiful user cards (first 10 users)</div>
          </div>

          <div  id='loading users' class="loading"><i class="fa-solid fa-circle-notch"></i> Loading users</div>
          <div class="divider">
            <hr><span style="margin: 20px;">Users will appear here</span><hr>    
          </div>

          <div id="searchbar" style="text-align: right; margin: 20px;"> 
            <input type="text" class="search-bar" placeholder="search"/>
          </div>

          <div id="users" class="userss"></div>
        
    </div>

 <script>    
  const usersDiv = document.getElementById('users');
    const loadingDiv = document.getElementById('loading users');
    const searchBars = document.getElementById('searchbar');
    let usernames = []
    fetch('https://api.github.com/users')
      .then(res => res.json())
      .then(users => {
        loadingDiv.textContent="Load successful.";
        usernames.push(...users)
        users.slice(0,10).forEach(user => {
          const div = document.createElement('div');
          div.className = 'name';
          div.innerHTML = `
            <img src='${user.avatar_url}'' width='85px' style="border-radius:100px; border"><br>
            <div style="font-weight:bold; margin-top:10px; margin-bottom:-10px">${user.login}</div><br>
            <a href="https://github.com/${user.html_url}" target="_blank" style="text-decoration: none; color: rgb(127, 42, 211);"><i class="fa-solid fa-arrow-up-right-from-square" style="padding:0px 7px"></i> View profile</a>
          `;
          usersDiv.appendChild(div);
        });
      })

    
      .catch(err => {
        loadingDiv.textContent = 'Failed to load users!';
        loadingDiv.style.backgroundColor='red'
        loadingDiv.style.fontWeight="bold"
        console.error(err);
        alert(err)
      });


searchBars.addEventListener("input", (event) => {
  usersDiv.innerHTML=''
  let searchValue = event.target.value;

  usernames.slice(0,10).forEach((user) => {
    if (user.login.includes(searchValue)) {
      let userDiv = document.createElement("div");
      userDiv.className = "name";
      userDiv.innerHTML = `
            <img src=${user.avatar_url}' width='85px' style="border-radius:100px">
             <div style="font-weight:bold; margin-top:10px; margin-bottom:-10px">${user.login}</div><br>
            <a href="https://github.com/${user.html_url}" target="_blank" style="text-decoration: none; color: rgb(127, 42, 211);"><i class="fa-solid fa-arrow-up-right-from-square" style="padding:0px 7px"></i> View profile</a>
            `;
      users.appendChild(userDiv);
    }
  });

});</script>
</body>
</html>
